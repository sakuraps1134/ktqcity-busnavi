<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>北九州市営バスロケ</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
}

#map{
    width:100%;
    height:100%;
}

.bus-popup{
    line-height:1.6;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ===== Cloudflare Worker =====
const PROXY =
    "https://ktq-proxy.sakuraps1134.workers.dev/?url=";

// ===== 地図 =====
const map = L.map("map").setView(
    [33.883,130.875],
    12
);



L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        attribution:"© OpenStreetMap"
    }
).addTo(map);

const busStopMap = {};
const timetableMap = {};
async function loadBusStops(){

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            "https://kitakyushu.busyohou.jp/api/v2/busstop/busstops"
        )
    );

    const busStops = await res.json();

    busStops.forEach(stop => {
        busStopMap[stop.Id] = stop.Name;
    });

    console.log(
        "バス停読込完了",
        Object.keys(busStopMap).length
    );
}

// マーカー管理
const markerLayer = L.layerGroup().addTo(map);

// ======================
// XML取得
// ======================
async function fetchXml(url){

    const res = await fetch(
        PROXY + encodeURIComponent(url)
    );

    if(!res.ok){
        throw new Error(
            `HTTP ${res.status}`
        );
    }

    const text = await res.text();

    return new DOMParser().parseFromString(
        text,
        "text/xml"
    );
}

// ======================
// 行路取得
// ======================
async function getRoutes(){

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            "https://kitakyushu.busyohou.jp/api/v1/busstop/operating_bus"
        )
    );

    return await res.json();

}
function buildTimetableHtml(busId){

    const position = timetableMap[busId];
    console.log(position.StopTimeUpdates[0]);

    if(!position){
        return "<p>時刻表なし</p>";
    }

    let html = `
        <table border="1"
               style="border-collapse:collapse;width:100%">
        <tr>
            <th>バス停</th>
            <th>時刻</th>
        </tr>
    `;

    position.StopTimeUpdates.forEach(stop => {

    const dt =
        stop.Departure?.Time ||
        stop.Arrival?.Time;

    if (!dt) return;

    const stopName =
        busStopMap[stop.BusStopId] ||
        stop.BusStopId;

    const time =
        dt.substring(11,16);

    html += `
        <tr>
            <td>${stopName}</td>
            <td>${time}</td>
        </tr>
    `;
});

    html += "</table>";

    return html;
}

// ======================
// 1行路取得
// ======================
async function loadRoute(routeId, staffeName) {

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            `https://kitakyushu.busyohou.jp/api/v1/busstop/bus_maps?rid=${routeId}`
        )
    );

    const data = await res.json();

    if (!data.Sujis) return;

    data.Sujis.forEach(suji => {

    if (!suji.Bus) return;

    const bus = suji.Bus;

    // ←追加
    const busId = bus.BusId;

    const lat = bus.BusLatitude;
    const lon = bus.BusLongitude;

    if (!lat || !lon) return;

    const marker = L.marker([lat, lon]);

       marker.bindPopup(`
<div style="width:350px">

    <b>車両番号</b><br>
   ${toHalfWidth(bus.BusName)}<br><br>

    <b>行路</b><br>
    ${staffeName}<br><br>

    <div style="
        max-height:300px;
        overflow-y:auto;
        border:1px solid #ccc;
    ">
        ${buildTimetableHtml(busId)}
    </div>

</div>
`);

        markerLayer.addLayer(marker);

    });

}


function toHalfWidth(str){

    return String(str).replace(
        /[０-９]/g,
        s => String.fromCharCode(
            s.charCodeAt(0) - 65248
        )
    );

}

async function loadBusPositionTimetable(){
    for (const key in timetableMap) {
    delete timetableMap[key];
}

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            "https://kitakyushu.busyohou.jp/api/v2/busstop/buses/position"
        )
    );

    const positions = await res.json();

    timetableMap.clear?.();

    positions.forEach(bus => {

        timetableMap[bus.BusId] = bus;

    });

}
// ======================
// 全更新
// ======================
async function refreshBusLocation(){

    markerLayer.clearLayers();

    const routes = await getRoutes();

    await Promise.all(

        routes.map(route =>

            loadRoute(
                route.RouteId,
                route.StaffeName
            )

        )

    );

}

// 初回
// ======================
// 起動
// ======================

(async () => {

    // バス停マスタ取得（初回のみ）
    await loadBusStops();

    // 運行中車両時刻表取得
    await loadBusPositionTimetable();

    // 地図表示
    await refreshBusLocation();

})();

// 30秒ごと更新
setInterval(async () => {

    await loadBusPositionTimetable();

    await refreshBusLocation();

}, 30000);

</script>

</body>
</html>
