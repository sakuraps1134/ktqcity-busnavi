<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>北九州市営バスロケ</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
}

#map{
    width:100%;
    height:100%;
}

.bus-popup{
    line-height:1.6;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ===== Cloudflare Worker =====
const PROXY =
    "https://ktq-proxy.sakuraps1134.workers.dev/?url=";

// ===== 地図 =====
const map = L.map("map").setView(
    [33.883,130.875],
    12
);

L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        attribution:"© OpenStreetMap"
    }
).addTo(map);

// マーカー管理
const markerLayer = L.layerGroup().addTo(map);

// ======================
// XML取得
// ======================
async function fetchXml(url){

    const res = await fetch(
        PROXY + encodeURIComponent(url)
    );

    if(!res.ok){
        throw new Error(
            `HTTP ${res.status}`
        );
    }

    const text = await res.text();

    return new DOMParser().parseFromString(
        text,
        "text/xml"
    );
}

// ======================
// 行路取得
// ======================
async function getRoutes(){

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            "https://kitakyushu.busyohou.jp/api/v1/busstop/operating_bus"
        )
    );

    return await res.json();

}

// ======================
// 1行路取得
// ======================
async function loadRoute(routeId, staffeName) {

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            `https://kitakyushu.busyohou.jp/api/v1/busstop/bus_maps?rid=${routeId}`
        )
    );

    const data = await res.json();

    if (!data.Sujis) return;

    data.Sujis.forEach(suji => {

        if (!suji.Bus) return;

        const bus = suji.Bus;

        const lat = bus.BusLatitude;
        const lon = bus.BusLongitude;

        if (!lat || !lon) return;

        const marker = L.marker([lat, lon]);

        marker.bindPopup(`
            <b>車両番号</b><br>
            ${bus.BusName}<br><br>

            <b>行路</b><br>
            ${staffeName}
        `);

        markerLayer.addLayer(marker);

    });

}

// ======================
// 全更新
// ======================
async function refreshBusLocation(){

    markerLayer.clearLayers();

    const routes = await getRoutes();

    await Promise.all(

        routes.map(route =>

            loadRoute(
                route.RouteId,
                route.StaffeName
            )

        )

    );

}

// 初回
refreshBusLocation();

// 30秒ごと更新
setInterval(
    refreshBusLocation,
    30000
);

</script>

</body>
</html>
