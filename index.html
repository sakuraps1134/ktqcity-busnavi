<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>北九州市営バスロケ</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
}

#map{
    width:100%;
    height:100%;
}

.bus-popup{
    line-height:1.6;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ===== Cloudflare Worker =====
const PROXY =
    "https://ktq-proxy.sakuraps1134.workers.dev/?url=";

// ===== 地図 =====
const map = L.map("map").setView(
    [33.883,130.875],
    12
);



L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        attribution:"© OpenStreetMap"
    }
).addTo(map);

const busStopMap = {};
const timetableMap = {};
async function loadBusStops(){

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            "https://kitakyushu.busyohou.jp/api/v2/busstop/busstops"
        )
    );

    const busStops = await res.json();

    busStops.forEach(stop => {
        busStopMap[stop.Id] = stop.Name;
    });

    console.log(
        "バス停読込完了",
        Object.keys(busStopMap).length
    );
}

// マーカー管理
const markerLayer = L.layerGroup().addTo(map);

// ======================
// XML取得
// ======================
async function fetchXml(url){

    const res = await fetch(
        PROXY + encodeURIComponent(url)
    );

    if(!res.ok){
        throw new Error(
            `HTTP ${res.status}`
        );
    }

    const text = await res.text();

    return new DOMParser().parseFromString(
        text,
        "text/xml"
    );
}

// ======================
// 行路取得
// ======================
async function getRoutes(){

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            "https://kitakyushu.busyohou.jp/api/v1/busstop/operating_bus"
        )
    );

    return await res.json();

}
// ======================
// 1行路取得（この関数を追加してください）
// ======================
async function loadRoute(routeId, staffeName) {
    const res = await fetch(
        PROXY + encodeURIComponent(`https://kitakyushu.busyohou.jp/api/v1/busstop/bus_maps?rid=${routeId}`)
    );
    const data = await res.json();
    
    if (!data.Sujis) return;
    
    data.Sujis.forEach(suji => {
        if (!suji.Bus) return;
        const bus = suji.Bus;
        const busId = bus.BusId;
        const lat = bus.BusLatitude;
        const lon = bus.BusLongitude;
        
        if (!lat || !lon) return;
        
      const marker = L.marker([lat, lon]);

marker.bindPopup(`
    <div style="width: 280px; max-height: 300px; display: flex; flex-direction: column;">
        <div style="margin-bottom: 8px;">
            <div style="font-weight: bold;">車両番号</div>
            <div>${toHalfWidth(bus.BusName)}</div>
            <div style="font-weight: bold; margin-top: 5px;">行路</div>
            <div>${staffeName}</div>
        </div>
        <div style="flex-grow: 1; overflow-y: auto; border: 1px solid #ccc;">
            ${buildTimetableHtml(busId, suji)}
        </div>
    </div>
`);

marker.on("popupopen", (e) => {
    setTimeout(() => {

        const container = e.popup.getElement()
            .querySelector("div[style*='overflow-y']");

        if (!container) return;

        const target = container.querySelector(".has-time");

        if (target) {
            container.scrollTop = target.offsetTop - 50;
        }

    }, 50);
});

markerLayer.addLayer(marker);
    });
}
// ======================
// 1行路取得
// ======================
function buildTimetableHtml(busId, suji) {
    const position = timetableMap[busId];
    if (!position || !suji) {
        return "<p>時刻表なし</p>";
    }

  let html = `
    <table style="
        border-collapse: collapse;
        width: 100%;
        table-layout: fixed;
        font-size: 14px;
    ">
        <thead>
            <tr style="position: sticky; top: 0; background: #eee; z-index: 1;">
                <th style="
                    padding: 6px;
                    text-align: left;
                    border-bottom: 2px solid #ccc;
                ">
                    バス停
                </th>

                <th style="
                    width: 70px;
                    padding: 6px;
                    text-align: center;
                    border-bottom: 2px solid #ccc;
                ">
                    時刻
                </th>
            </tr>
        </thead>
        <tbody>
`;

    const posStops = position.StopTimeUpdates || [];
    const sujiStops = suji.SujiStatus || [];
    const count = Math.min(posStops.length, sujiStops.length);

    // 各行の生成
    for (let i = 0; i < count; i++) {
        const posStop = posStops[i];
        const sujiStop = sujiStops[i];
        const stopName = busStopMap[posStop.BusStopId] || posStop.BusStopId;
        
        // 時刻の取得
        const dt = sujiStop.DepartureEstimatedTime || 
                   sujiStop.ArrivalEstimatedTime || 
                   sujiStop.DepartTime || 
                   sujiStop.ArriveTime;
        const time = dt
    ? dt.substring(11, 16)
    : "通過済";

       const hasTime = !!dt;

html += `
    <tr
    class="${hasTime ? 'has-time' : 'no-time'}"
    style="
        ${hasTime
            ? ''
            : 'background:#f3f3f3;color:#999;'
        }
    "
>
       
        <td style="
    padding:4px;
    border-bottom:1px solid #eee;
    font-family:system-ui;
    font-size:13px;
">
            ${stopName}
        </td>
        <td style="
    padding:4px;
    border-bottom:1px solid #eee;
    font-family:system-ui;
    font-size:13px;
">
            ${time}
        </td>
    </tr>
`;
    }

    html += `</tbody></table>`;
    return html;
}


function toHalfWidth(str){

    return String(str).replace(
        /[０-９]/g,
        s => String.fromCharCode(
            s.charCodeAt(0) - 65248
        )
    );

}

async function loadBusPositionTimetable(){
    for (const key in timetableMap) {
    delete timetableMap[key];
}

    const res = await fetch(
        PROXY +
        encodeURIComponent(
            "https://kitakyushu.busyohou.jp/api/v2/busstop/buses/position"
        )
    );

    const positions = await res.json();

    timetableMap.clear?.();

    positions.forEach(bus => {

        timetableMap[bus.BusId] = bus;

    });

}
// ======================
// 全更新
// ======================
async function refreshBusLocation(){

    markerLayer.clearLayers();

    const routes = await getRoutes();

    await Promise.all(

        routes.map(route =>

            loadRoute(
                route.RouteId,
                route.StaffeName
            )

        )

    );

}

// 初回
// ======================
// 起動
// ======================

(async () => {

    // バス停マスタ取得（初回のみ）
    await loadBusStops();

    // 運行中車両時刻表取得
    await loadBusPositionTimetable();

    // 地図表示
    await refreshBusLocation();

})();

// 30秒ごと更新
setInterval(async () => {

    await loadBusPositionTimetable();

    await refreshBusLocation();

}, 30000);

</script>

</body>
</html>
